<!-- Register Form Partial Component -->
<section id="register" class="auth-section">
  <div class="auth-card">
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join us today and get started</p>

    <form class="auth-form" id="registerForm">
      <div class="form-row">
        <div class="form-group half">
          <label for="firstName" class="form-label">First Name</label>
          <input
            type="text"
            id="firstName"
            name="firstName"
            class="form-input"
            placeholder="John"
            required
          />
        </div>
        <div class="form-group half">
          <label for="lastName" class="form-label">Last Name</label>
          <input
            type="text"
            id="lastName"
            name="lastName"
            class="form-input"
            placeholder="Doe"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="registerEmail" class="form-label">Email Address</label>
        <input
          type="email"
          id="registerEmail"
          name="email"
          class="form-input"
          placeholder="john.doe@example.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="registerPassword" class="form-label">Password</label>
        <input
          type="password"
          id="registerPassword"
          name="password"
          class="form-input"
          placeholder="Create a strong password"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          class="form-input"
          placeholder="Confirm your password"
          required
        />
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" name="terms" class="checkbox-input" required />
          <span class="checkbox-text"
            >I agree to the
            <a href="#terms" class="terms-link">Terms & Conditions</a></span
          >
        </label>
      </div>

      <button type="submit" class="auth-btn primary">Create Account</button>

      <div class="auth-divider">
        <span>or sign up with</span>
      </div>

      <div class="social-login">
        <button type="button" class="social-btn google">
          <span class="social-icon">G</span>
          Google
        </button>
        <button type="button" class="social-btn github">
          <span class="social-icon">⚡</span>
          GitHub
        </button>
      </div>
    </form>

    <div class="auth-switch">
      <p>
        Already have an account?
        <a href="#login" class="switch-link">Sign in</a>
      </p>
    </div>
  </div>
</section>
